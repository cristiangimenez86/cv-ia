openapi: 3.0.3
info:
  title: CV API
  version: 1.0.0
  description: >
    Public CV API + CV-scoped chat. This API is designed for a CV website (Next.js) with a backend in .NET.
    OpenAI keys must exist only in the backend service.
    Recommended default model for chat completions (backend configuration): gpt-4o-mini (cost/quality balance; override per deployment).

    Implementation status: This spec is the current contract.
    Implemented endpoints: `/health`, `/api/v1/cv` (PDF download), and `/api/v1/chat/completions`.

servers:
  - url: http://localhost:8080
    description: Local development (adjust port if needed)

tags:
  - name: Health
  - name: CV
  - name: Chat

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/cv:
    get:
      tags: [CV]
      summary: Download CV PDF by locale
      parameters:
        - in: query
          name: lang
          required: false
          schema:
            type: string
            enum: [es, en]
          description: Language (default: en)
      responses:
        "200":
          description: CV PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid language
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: PDF file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/chat/completions:
    post:
      tags: [Chat]
      summary: CV-scoped chat completion (public)
      description: >
        Returns an assistant message constrained to the CV content.
        The backend must enforce guardrails (no unrelated knowledge, no secrets, no arbitrary browsing).
        The upstream OpenAI model is a backend deployment setting; the documented default is gpt-4o-mini.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Assistant reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: AI provider rate limit (when using live OpenAI backend)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Bad gateway — AI provider error, auth failure, or unreachable provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: AI provider request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthResponse:
      type: object
      required: [status, service, timestampUtc]
      properties:
        status:
          type: string
          example: healthy
        service:
          type: string
          example: cv-ia-backend
        timestampUtc:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: invalid_request
        message:
          type: string
          example: The request is invalid.
        details:
          type: object
          additionalProperties: true

    ChatRequest:
      type: object
      description: >
        Temperature and max completion tokens are not accepted from clients;
        they are configured only via OpenAiChat in appsettings on the server.
      required: [lang, messages]
      properties:
        lang:
          type: string
          enum: [es, en]
          default: en
        messages:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ChatMessage"

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant]
        content:
          type: string

    ChatResponse:
      type: object
      required: [id, createdAt, message]
      properties:
        id:
          type: string
          example: chatcmpl_123
        createdAt:
          type: string
          format: date-time
        message:
          $ref: "#/components/schemas/ChatMessage"
        citations:
          type: array
          items:
            $ref: "#/components/schemas/ChatCitation"

    ChatCitation:
      type: object
      required: [sourceId, title]
      properties:
        sourceId:
          type: string
          example: content/es/experience.md
        title:
          type: string
          example: Experience
        snippet:
          type: string
          nullable: true
