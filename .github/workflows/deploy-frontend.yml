name: deploy-frontend

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: cristiangimenez86/cv-web:latest

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Trigger Portainer stack redeploy
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${PORTAINER_URL:-}" ] || [ -z "${PORTAINER_TOKEN:-}" ]; then
            echo "PORTAINER_URL or PORTAINER_TOKEN is missing."
            exit 1
          fi

          BASE_URL="${PORTAINER_URL%/}"
          STACK_ID="3"

          echo "Fetching Portainer stack metadata for stack ${STACK_ID}..."
          STACK_JSON="$(curl -sS -f \
            -H "Authorization: Bearer ${PORTAINER_TOKEN}" \
            "${BASE_URL}/api/stacks/${STACK_ID}")"

          ENDPOINT_ID="$(echo "${STACK_JSON}" | jq -r '.EndpointId // .endpointId // empty')"
          if [ -z "${ENDPOINT_ID}" ]; then
            echo "Could not resolve endpointId from stack metadata."
            echo "${STACK_JSON}"
            exit 1
          fi

          RECREATE_URL="${BASE_URL}/api/stacks/${STACK_ID}/recreate?endpointId=${ENDPOINT_ID}"
          echo "Triggering recreate at ${RECREATE_URL}"

          HTTP_CODE="$(curl -sS -o /tmp/portainer-recreate-response.json -w "%{http_code}" \
            -X POST "${RECREATE_URL}" \
            -H "Authorization: Bearer ${PORTAINER_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"pullImage":true}')"

          echo "Portainer recreate HTTP status: ${HTTP_CODE}"
          echo "Portainer response body:"
          cat /tmp/portainer-recreate-response.json || true

          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "Portainer stack recreate failed."
            exit 1
          fi
