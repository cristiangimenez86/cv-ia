name: deploy-frontend

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: ["main"]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: CV
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Deploy the exact commit validated by the CI workflow run.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: cristiangimenez86/cv-web:latest

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Trigger Portainer stack redeploy
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${PORTAINER_URL:-}" ] || [ -z "${PORTAINER_TOKEN:-}" ]; then
            echo "PORTAINER_URL or PORTAINER_TOKEN is missing."
            exit 1
          fi

          BASE_URL="${PORTAINER_URL%/}"
          STACK_ID="3"
          LAST_HTTP_CODE=""
          LAST_AUTH_SCHEME=""

          request_with_auth() {
            local method="$1"
            local url="$2"
            local output_file="$3"
            local data="${4:-}"

            local schemes=("bearer" "api-key")
            local status=""

            for scheme in "${schemes[@]}"; do
              local auth_header=""
              if [ "${scheme}" = "bearer" ]; then
                auth_header="Authorization: Bearer ${PORTAINER_TOKEN}"
              else
                auth_header="X-API-Key: ${PORTAINER_TOKEN}"
              fi

              if [ -n "${data}" ]; then
                status="$(curl -sS -o "${output_file}" -w "%{http_code}" \
                  -X "${method}" "${url}" \
                  -H "${auth_header}" \
                  -H "Content-Type: application/json" \
                  --data "${data}")"
              else
                status="$(curl -sS -o "${output_file}" -w "%{http_code}" \
                  -X "${method}" "${url}" \
                  -H "${auth_header}")"
              fi

              if [ "${status}" -ge 200 ] && [ "${status}" -lt 300 ]; then
                LAST_HTTP_CODE="${status}"
                LAST_AUTH_SCHEME="${scheme}"
                echo "Auth scheme '${scheme}' succeeded (${status})."
                return 0
              fi

              LAST_HTTP_CODE="${status}"
              echo "Auth scheme '${scheme}' returned HTTP ${status}."
            done

            echo "All Portainer authentication schemes failed for ${method} ${url}."
            return 1
          }

          echo "Fetching Portainer stack metadata for stack ${STACK_ID}..."
          STACK_META_FILE="/tmp/portainer-stack.json"
          request_with_auth "GET" "${BASE_URL}/api/stacks/${STACK_ID}" "${STACK_META_FILE}"
          STACK_JSON="$(cat "${STACK_META_FILE}")"

          ENDPOINT_ID="$(echo "${STACK_JSON}" | jq -r '.EndpointId // .endpointId // empty')"
          if [ -z "${ENDPOINT_ID}" ]; then
            echo "Could not resolve endpointId from stack metadata."
            echo "${STACK_JSON}"
            exit 1
          fi

          RECREATE_OUTPUT_FILE="/tmp/portainer-recreate-response.json"
          DEPLOY_SUCCESS="false"
          HAS_GIT_CONFIG="$(echo "${STACK_JSON}" | jq -r '((.GitConfig // .gitConfig // {}) | length) > 0')"

          if [ "${HAS_GIT_CONFIG}" = "true" ]; then
            echo "Detected Git-managed stack metadata. Trying git redeploy endpoint."
            if request_with_auth "POST" "${BASE_URL}/api/stacks/${STACK_ID}/git/redeploy?endpointId=${ENDPOINT_ID}" "${RECREATE_OUTPUT_FILE}"; then
              DEPLOY_SUCCESS="true"
              echo "Git redeploy succeeded (${LAST_HTTP_CODE}) using auth '${LAST_AUTH_SCHEME}'."
            else
              echo "Git redeploy failed with HTTP ${LAST_HTTP_CODE}."
              echo "Response body:"
              cat "${RECREATE_OUTPUT_FILE}" || true
            fi
          else
            echo "Detected non Git-managed stack metadata. Using stack file + update flow."
            STACK_FILE_OUTPUT="/tmp/portainer-stack-file.json"
            if request_with_auth "GET" "${BASE_URL}/api/stacks/${STACK_ID}/file?endpointId=${ENDPOINT_ID}" "${STACK_FILE_OUTPUT}"; then
              STACK_FILE_CONTENT="$(jq -r '.StackFileContent // .stackFileContent // empty' "${STACK_FILE_OUTPUT}")"
              if [ -z "${STACK_FILE_CONTENT}" ]; then
                echo "Stack file content was empty; cannot build update payload."
              else
                STACK_ENV_JSON="$(echo "${STACK_JSON}" | jq -c '.Env // .env // []')"
                UPDATE_PAYLOAD="$(jq -cn \
                  --arg stackFileContent "${STACK_FILE_CONTENT}" \
                  --argjson env "${STACK_ENV_JSON}" \
                  '{StackFileContent: $stackFileContent, Env: $env, Prune: true, PullImage: true}')"

                if request_with_auth "PUT" "${BASE_URL}/api/stacks/${STACK_ID}?endpointId=${ENDPOINT_ID}" "${RECREATE_OUTPUT_FILE}" "${UPDATE_PAYLOAD}"; then
                  DEPLOY_SUCCESS="true"
                  echo "Stack update succeeded (${LAST_HTTP_CODE}) using auth '${LAST_AUTH_SCHEME}'."
                else
                  echo "Stack update failed with HTTP ${LAST_HTTP_CODE}."
                  echo "Response body:"
                  cat "${RECREATE_OUTPUT_FILE}" || true
                fi
              fi
            else
              echo "Could not retrieve stack file for update flow (HTTP ${LAST_HTTP_CODE})."
              echo "Response body:"
              cat "${STACK_FILE_OUTPUT}" || true
            fi
          fi

          if [ "${DEPLOY_SUCCESS}" != "true" ]; then
            echo "Portainer stack redeploy failed for detected stack strategy."
            exit 1
          fi
