name: deploy-frontend

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: ["main"]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: CV
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Deploy the exact commit validated by the CI workflow run.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: cristiangimenez86/cv-web:latest

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Trigger Portainer stack redeploy
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${PORTAINER_URL:-}" ] || [ -z "${PORTAINER_TOKEN:-}" ]; then
            echo "PORTAINER_URL or PORTAINER_TOKEN is missing."
            exit 1
          fi

          BASE_URL="${PORTAINER_URL%/}"
          STACK_ID="3"

          request_with_auth() {
            local method="$1"
            local url="$2"
            local output_file="$3"
            local data="${4:-}"

            local schemes=("bearer" "api-key")
            local status=""

            for scheme in "${schemes[@]}"; do
              local auth_header=""
              if [ "${scheme}" = "bearer" ]; then
                auth_header="Authorization: Bearer ${PORTAINER_TOKEN}"
              else
                auth_header="X-API-Key: ${PORTAINER_TOKEN}"
              fi

              if [ -n "${data}" ]; then
                status="$(curl -sS -o "${output_file}" -w "%{http_code}" \
                  -X "${method}" "${url}" \
                  -H "${auth_header}" \
                  -H "Content-Type: application/json" \
                  --data "${data}")"
              else
                status="$(curl -sS -o "${output_file}" -w "%{http_code}" \
                  -X "${method}" "${url}" \
                  -H "${auth_header}")"
              fi

              if [ "${status}" -ge 200 ] && [ "${status}" -lt 300 ]; then
                echo "Auth scheme '${scheme}' succeeded (${status})."
                return 0
              fi

              echo "Auth scheme '${scheme}' returned HTTP ${status}."
            done

            echo "All Portainer authentication schemes failed for ${method} ${url}."
            return 1
          }

          echo "Fetching Portainer stack metadata for stack ${STACK_ID}..."
          STACK_META_FILE="/tmp/portainer-stack.json"
          request_with_auth "GET" "${BASE_URL}/api/stacks/${STACK_ID}" "${STACK_META_FILE}"
          STACK_JSON="$(cat "${STACK_META_FILE}")"

          ENDPOINT_ID="$(echo "${STACK_JSON}" | jq -r '.EndpointId // .endpointId // empty')"
          if [ -z "${ENDPOINT_ID}" ]; then
            echo "Could not resolve endpointId from stack metadata."
            echo "${STACK_JSON}"
            exit 1
          fi

          RECREATE_URL="${BASE_URL}/api/stacks/${STACK_ID}/recreate?endpointId=${ENDPOINT_ID}"
          echo "Triggering recreate at ${RECREATE_URL}"

          RECREATE_OUTPUT_FILE="/tmp/portainer-recreate-response.json"
          if request_with_auth "POST" "${RECREATE_URL}" "${RECREATE_OUTPUT_FILE}" '{"pullImage":true}'; then
            HTTP_CODE="200"
          else
            HTTP_CODE="401"
          fi

          echo "Portainer recreate HTTP status: ${HTTP_CODE}"
          echo "Portainer response body:"
          cat "${RECREATE_OUTPUT_FILE}" || true

          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "Portainer stack recreate failed."
            exit 1
          fi
