# Optional stack env (Portainer → Stack → Environment):
#   OPENAI_API_KEY, OPENAI_PROJECT_ID, OPENAI_ORG_ID, POSTGRES_PASSWORD, RAG_INGESTION_API_KEY
#   BACKEND_API_ACCESS_TOKEN — optional; forwarded to ApiAccess__Token (api) and Next (cv) when using bearer gate

services:
  proxy:
    image: nginx:alpine
    container_name: cv-proxy
    restart: unless-stopped
    ports:
      - "8055:80"
    depends_on:
      - cv
      - api
    command:
      - /bin/sh
      - -c
      - |
          cat <<'EOF' >/etc/nginx/conf.d/default.conf
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass http://cv:80;
                  proxy_http_version 1.1;
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $$scheme;
                  proxy_set_header Upgrade $$http_upgrade;
                  proxy_set_header Connection "upgrade";
              }

              location = /health {
                  proxy_pass http://api:8080/health;
                  proxy_http_version 1.1;
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $$scheme;
              }

              # /api/* via Next so Route Handlers can attach BACKEND_API_ACCESS_TOKEN to the .NET API.
              location /api/ {
                  proxy_pass http://cv:80;
                  proxy_http_version 1.1;
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $$scheme;
              }
          }
          EOF
          exec nginx -g 'daemon off;'

  cv:
    image: cristiangimenez86/cv-web:latest
    container_name: cv
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # Next /api/* proxy target on the Docker network
      BACKEND_INTERNAL_URL: http://api:8080
      BACKEND_API_ACCESS_TOKEN: ${BACKEND_API_ACCESS_TOKEN:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/en"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  api:
    image: cristiangimenez86/cv-api:latest
    container_name: cv-api
    restart: unless-stopped
    depends_on:
      pgvector:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ApiAccess__Token: ${BACKEND_API_ACCESS_TOKEN:-}
      # SSL Mode=Disable: typical for Postgres in Docker; avoids Npgsql SSL negotiation issues.
      ConnectionStrings__Rag: Host=pgvector;Port=5432;Database=cvia;Username=cvia;Password=${POSTGRES_PASSWORD:-cvia};SSL Mode=Disable
      # Set true only when pgvector is up and migrated; /health checks DB when enabled.
      Rag__IngestionApiKey: ${RAG_INGESTION_API_KEY:-}
      OpenAiChat__ApiKey: ${OPENAI_API_KEY}
      OpenAiChat__OpenAiProjectId: ${OPENAI_PROJECT_ID}
      OpenAiChat__OpenAiOrganizationId: ${OPENAI_ORG_ID:-}
    ports:
      - "8056:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: cv-ia-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: cvia
      POSTGRES_USER: cvia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cvia}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvia -d cvia"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgvector-data:/var/lib/postgresql/data

volumes:
  pgvector-data:
