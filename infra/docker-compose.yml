name: cv-ia-local

services:
  proxy:
    image: nginx:alpine
    container_name: cv-proxy
    restart: unless-stopped
    ports:
      - "8055:80"
    depends_on:
      - cv
      - api
    command:
      - /bin/sh
      - -c
      - |
          cat <<'EOF' >/etc/nginx/conf.d/default.conf
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass http://cv:80;
                  proxy_http_version 1.1;
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $$scheme;
                  proxy_set_header Upgrade $$http_upgrade;
                  proxy_set_header Connection "upgrade";
              }

              location = /health {
                  proxy_pass http://api:8080/health;
                  proxy_http_version 1.1;
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $$scheme;
              }

              location /api/ {
                  proxy_pass http://api:8080;
                  proxy_http_version 1.1;
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $$scheme;
              }
          }
          EOF
          exec nginx -g 'daemon off;'

  cv:
    image: cristiangimenez86/cv-web:latest
    container_name: cv
    restart: unless-stopped
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/en"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  api:
    image: cristiangimenez86/cv-api:latest
    container_name: cv-api
    restart: unless-stopped
    ports:
      - "8056:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: cv-ia-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: cvia
      POSTGRES_USER: cvia
      POSTGRES_PASSWORD: cvia
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvia -d cvia"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgvector-data:/var/lib/postgresql/data

volumes:
  pgvector-data:
