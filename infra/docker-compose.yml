name: cv-ia-local

services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: cv-ia-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: cvia
      POSTGRES_USER: cvia
      POSTGRES_PASSWORD: cvia
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvia -d cvia"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgvector-data:/var/lib/postgresql/data

volumes:
  pgvector-data:
