name: cv-ia-local

services:
  proxy:
    image: nginx:alpine
    container_name: cv-proxy
    restart: unless-stopped
    ports:
      - "8055:80"
    depends_on:
      - cv
      - api
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  cv:
    image: cristiangimenez86/cv-web:latest
    container_name: cv
    restart: unless-stopped
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/en"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  api:
    image: cristiangimenez86/cv-api:latest
    container_name: cv-api
    restart: unless-stopped
    ports:
      - "8056:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: cv-ia-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: cvia
      POSTGRES_USER: cvia
      POSTGRES_PASSWORD: cvia
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvia -d cvia"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgvector-data:/var/lib/postgresql/data

volumes:
  pgvector-data:
